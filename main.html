<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/08085f3e4c.js" crossorigin="anonymous"></script>
</head>

<body class="bg-gray-50">
    <section>
        <nav class="flex items-center justify-between bg-gray-100 px-6 py-3">
            <div class="flex items-center gap-2">
                <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                <a href="/">
                    <h1 class="text-xl font-semibold text-gray-700">GitHub Issues Tracker</h1>
                </a>
            </div>
            <div class="flex gap-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-issue" type="search" required placeholder="Search issue..." />
                </label>
                <button class="bg-indigo-700 text-white px-2  rounded">+ New Issue</button>
            </div>
        </nav>

    </section>
    <section>
        <main class="space-y-4">
            <div id="issue-tab" class="bg-white max- mt-8 mx-auto  w-11/12 rounded-sm py-4 p-10">
                <div class="flex gap-3">
                    <button class="btn bg-indigo-600 text-white px-4 py-1 rounded" id="all-tab">All</button>
                    <button id="open-tab" class="btn ">open</button>
                    <button id="closed-tab" class="btn ">closed</button>
                </div>
            </div>
            <div class="flex mx-auto  w-11/12 bg-white py-4 p-10  rounded-sm">
                <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                <div class="flex justify-between w-12/12">
                    <div class="px-4">
                        <h2> <span id="issue-count">0</span> Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                    <div class="flex gap-6 pt-3">
                        <div class="w-3 h-3 bg-green-700 rounded-full mt-2 mx-2"></div>
                        <h6>open</h6>
                        <div class="w-3 h-3 bg-purple-700 rounded-full mt-2 mx-2"></div>
                        <h6>closed</h6>
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-4 bg-gray-100 rounded-sm mx-auto p-10 w-11/12 gap-4 my-10">
                <!-- <div class="issue-card"></div> -->
            </div>
            <!-- <div class="issue-card"></div> -->
            <dialog id="issue_modal" class="modal">
                <div class="modal-box">
                    <div id="modal-content">
                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn bg-indigo-700 text-white">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>

            <!-- data loading spinner -->
            <div id="loader" class="text-center hidden">
                <span class="loading loading-spinner text-secondary"></span>
            </div>

            <div id="issue-container"></div>
        </main>
    </section>
    <script src="./main.js"></script>
</body>

</html>
