<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/08085f3e4c.js" crossorigin="anonymous"></script>
</head>

<body>
    <section>
        <nav class="flex items-center justify-between bg-gray-100 px-6 py-3">
            <div class="flex items-center gap-2">
                <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                <h1 class="text-xl font-semibold text-gray-700">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-4">
                <button class="btn text-gray-400 rounded  "><i class="fa-brands fa-sistrix"></i> Search
                    issues...</button>
                <button class="bg-indigo-700 text-white px-4 py-1 rounded">+ New Issue</button>
            </div>
        </nav>

    </section>
    <section class="">
        <main class="">
            <div id="issue-tab" class="bg-gray-100 max- mt-8">
                <div class="flex gap-3">
                    <button class="btn bg-indigo-600 text-white px-4 py-1 rounded">All</button>
                    <button class="btn">open</button>
                    <button class="btn">closed</button>
                </div>
            </div>
            <div class="flex">
                <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                <div class="justify-between">
                    <h2>50 Issues</h2>
                    <p>Track and manage your project issues</p>

                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-4 bg-gray-100 mx-auto p-10 w-11/12 gap-4 my-10">
            </div>
            <!-- modal -->
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
            <dialog id="issue_modal" class="modal">
                <div class="modal-box">
                    <div id="modal-content">     
                    </div>
                      <div class="modal-action">
                            <form method="dialog">
                                <!-- if there is a button in form, it will close the modal -->
                                <button class="btn bg-indigo-700 text-white">Close</button>
                            </form>
                        </div>
                </div>
            </dialog>
        </main>
    </section>
    <script src="./main.js"></script>
</body>

</html>
