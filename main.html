<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/08085f3e4c.js" crossorigin="anonymous"></script>
</head>

<body class="bg-gray-50">
    <section>
        <nav class="flex items-center justify-between bg-gray-100 px-6 py-3">
            <div class="flex items-center gap-2">
                <img class="w-6 h-6" src="./assets/github-logo.png" alt="">
                <h1 class="text-xl font-semibold text-gray-700">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-issue" type="search" required placeholder="Search issue..." />
                </label>
                <!-- <button class="btn text-gray-400 rounded  "><i class="fa-brands fa-sistrix"></i> Search
                    issues...</button> -->
                <button class="bg-indigo-700 text-white px-4  rounded">+ New Issue</button>
            </div>
        </nav>

    </section>
    <section>
        <main class="space-y-4">
            <div id="issue-tab" class="bg-white max- mt-8 mx-auto  w-11/12 rounded-sm py-4 p-10">
                <div class="flex gap-3">
                    <button class="btn bg-indigo-600 text-white px-4 py-1 rounded">All</button>
                    <button class="btn">open</button>
                    <button class="btn">closed</button>
                </div>
            </div>
            <div class="flex mx-auto  w-11/12 bg-white py-4 p-10  rounded-sm">
                <img class="w-10 h-10" src="./assets/Aperture.png" alt="">
                <div class="justify-between">
                    <h2>50 Issues</h2>
                    <p>Track and manage your project issues</p>

                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-4 bg-gray-100 rounded-sm mx-auto p-10 w-11/12 gap-4 my-10">
            </div>
            <dialog id="issue_modal" class="modal">
                <div class="modal-box">
                    <div id="modal-content">
                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <button class="btn bg-indigo-700 text-white">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </main>
    </section>
    <script src="./main.js"></script>
</body>

</html>
